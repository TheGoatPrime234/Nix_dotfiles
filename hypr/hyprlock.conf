source = ~/.config/hypr/current-hyprlock.conf

background {
    monitor =
    path = /home/cato/.config/rice/wallpaper/dracula2.jpg   
    blur_passes = 2 
    blur_size = 7
}

label {
    monitor =
    text = $TIME
    font_size = 90
    font_family = JetBrainsMono Nerd Font Bold
    
    position = 0, 150
    halign = center
    valign = center
    animation = fadeOut, 1, 0.5, linear 
}

image {
    monitor =
    path = /home/cato/.config/rice/face/nix_face.png 
    size = 120
    border_size = 2
    
    position = 0, 0
    halign = center
    valign = center
}

input-field {
    monitor =
    size = 250, 50
    outline_thickness = 2
    dots_size = 0.2
    dots_spacing = 0.2
    dots_center = true
    
    fade_on_empty = false
    placeholder_text = <i>Passwort...</i>
    hide_input = false
    
    position = 0, -100
    halign = center
    valign = center
}
