general {
    lock_cmd = pidof hyprlock || hyprlock
    before_sleep_cmd = loginctl lock-session
    after_sleep-cmd = hyprctl dispatch dpms on && sleep 2 && hyprctl reload
}

listener {
    timeout = 240
    on-timeout = notify-send "HyprIdle is locking in 1 Minute" "HyprIdle is locking the device in 1 minute" -a hypridle
}

listener {
    timeout = 300
    on-timeout = loginctl lock-session && sleep 10 && systemctl suspend 
    on-resume = hyprctl dispath dpms eDP-1 on && sleep 2 && hyprctl reload
}
