# action to take after session completion
# options: "ask" | "start" | "quit"
onSessionEnd: "start"

asciiArt:
  enabled: true

  # available fonts: "mono12" | "rebel" | "ansi" | "ansiShadow"
  # default: mono12
  font: ansiShadow

  # color of the ASCII art timer
  # hex color or "none"
  color: "#5A56E0"

work:
  then:
    - [paplay, ~/pomo/metal_pipe.mp3]
  duration: 25m
  title: work session

  # cross-platform notifications
  notification:
    enabled: true
    urgent: true # persistent notification with alert sound (platform-dependent)
    title: work finished 🎉
    message: time to take a break
    icon: ~/my/icon.png

break:
  then:
    - [paplay, ~/pomo/metal_pipe.mp3]
  duration: 5m

  # will run after the session ends
  then:
    - [spd-say, "Back to work!"]

longBreak:
  then:
    - [paplay, ~/pomo/metal_pipe.mp3]
  enabled: true

  # number of work sessions before long break
  after: 4

  # long break duration
  duration: 15m
